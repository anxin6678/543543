<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <title>TT语音 - 100%免费免注册版</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/mqtt/4.2.8/mqtt.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
    
    <style>
        :root {
            --bg-color: #12121a;
            --panel-color: #1c1c28;
            --accent-color: #7b2cbf;
            --text-color: #ffffff;
            --text-secondary: #8e8e93;
            --seat-speaking: #00f5d4;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", Arial, sans-serif; background-color: #09090d; color: var(--text-color); height: 100dvh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        body { -webkit-user-select: none; user-select: none; }
        input { -webkit-user-select: text; user-select: text; }
        
        /* 登录遮罩层 */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 15, 0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .login-box { width: 100%; max-width: 360px; background: var(--panel-color); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; gap: 20px; }
        .login-box h2 { text-align: center; font-size: 20px; }
        .nickname-input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); padding: 12px 15px; border-radius: 12px; color: #fff; font-size: 15px; outline: none; text-align: center; }
        .avatar-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .avatar-option { width: 55px; height: 55px; border-radius: 50%; background: rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center; cursor: pointer; border: 2px solid transparent; }
        .avatar-option.selected { border-color: var(--accent-color); background: rgba(123, 44, 191, 0.2); }
        .avatar-option svg { width: 40px; height: 40px; }
        .enter-btn { background: linear-gradient(135deg, #9d4edd, var(--accent-color)); color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; }

        /* 主大厅布局 */
        .room-container { width: 100%; height: 100dvh; background: radial-gradient(circle at top, #2c1a4d 0%, var(--bg-color) 70%); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        @media (min-width: 768px) { .room-container { width: 414px; height: 820px; border-radius: 24px; border: 4px solid #23153c; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7); } body { background: radial-gradient(circle, #1a1525 0%, #050508 100%); } }
        
        .room-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }
        .room-title h3 { font-size: 16px; font-weight: 600; }
        .room-title p { font-size: 11px; color: var(--text-secondary); margin-top: 2px;}
        
        .seats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px 8px; padding: 15px 10px; flex-shrink: 0; }
        .seat-item { display: flex; flex-direction: column; align-items: center; }
        .avatar-wrap { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.06); position: relative; display: flex; justify-content: center; align-items: center; border: 2px solid transparent; }
        .seat-item.speaking .avatar-wrap { border-color: var(--seat-speaking); box-shadow: 0 0 10px rgba(0, 245, 212, 0.5); }
        .avatar-wrap svg { width: 35px; height: 35px; }
        .seat-index { position: absolute; bottom: -3px; background: var(--accent-color); font-size: 9px; padding: 1px 5px; border-radius: 10px; white-space: nowrap; }
        .user-name { font-size: 11px; color: var(--text-secondary); margin-top: 6px; max-width: 58px; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }

        .chat-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; -webkit-overflow-scrolling: touch; }
        .msg-item { background: rgba(255,255,255,0.04); padding: 8px 12px; border-radius: 12px; font-size: 13px; max-width: 85%; align-self: flex-start; line-height: 1.4; word-break: break-all; }
        .msg-item .sender { color: #17c3b2; font-weight: bold; margin-right: 5px; display: inline-flex; align-items: center; gap: 4px; }
        .msg-system { background: rgba(234, 84, 85, 0.1); color: #ea5455; align-self: center; font-size: 11px; }

        .emoji-bar { background: #191926; padding: 6px 15px; display: flex; gap: 15px; overflow-x: auto; border-top: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; scrollbar-width: none; }
        .emoji-bar::-webkit-scrollbar { display: none; }
        .emoji-btn { font-size: 20px; cursor: pointer; }

        .bottom-bar { padding: 10px 15px calc(10px + env(safe-area-inset-bottom)); background: #161622; display: flex; align-items: center; gap: 10px; flex-shrink: 0; z-index: 99; }
        .input-box { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 20px; color: #fff; font-size: 14px; outline: none; }
        .btn { background: var(--accent-color); border: none; color: white; padding: 10px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: bold; }
        .btn-icon { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; flex-shrink: 0; }
        .btn-icon.active { background: #ea5455; }
    </style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <h2>创建免签开黑档案</h2>
        <input type="text" class="nickname-input" id="nicknameInput" placeholder="输入昵称(请用英文或数字)" maxlength="12">
        <p style="font-size:12px; color:var(--text-secondary); text-align:center;">选择头像</p>
        <div class="avatar-selector" id="avatarSelector">
            <div class="avatar-option selected" onclick="selectAvatar(0)"><svg viewBox="0 0 1024 1024"><path d="M512 512c141.4 0 256-114.6 256-256S653.4 0 512 0 256 114.6 256 256s114.6 256 256 256zM512 614.4c-243.2 0-512 121.6-512 364.8v44.8h1024v-44.8c0-243.2-268.8-364.8-512-364.8z" fill="#ff4d6d"/></svg></div>
            <div class="avatar-option" onclick="selectAvatar(1)"><svg viewBox="0 0 1024 1024"><path d="M512 512c141.4 0 256-114.6 256-256S653.4 0 512 0 256 114.6 256 256s114.6 256 256 256zM512 614.4c-243.2 0-512 121.6-512 364.8v44.8h1024v-44.8c0-243.2-268.8-364.8-512-364.8z" fill="#00f5d4"/></svg></div>
            <div class="avatar-option" onclick="selectAvatar(2)"><svg viewBox="0 0 1024 1024"><path d="M512 512c141.4 0 256-114.6 256-256S653.4 0 512 0 256 114.6 256 256s114.6 256 256 256zM512 614.4c-243.2 0-512 121.6-512 364.8v44.8h1024v-44.8c0-243.2-268.8-364.8-512-364.8z" fill="#9d4edd"/></svg></div>
            <div class="avatar-option" onclick="selectAvatar(3)"><svg viewBox="0 0 1024 1024"><path d="M512 512c141.4 0 256-114.6 256-256S653.4 0 512 0 256 114.6 256 256s114.6 256 256 256zM512 614.4c-243.2 0-512 121.6-512 364.8v44.8h1024v-44.8c0-243.2-268.8-364.8-512-364.8z" fill="#ffb703"/></svg></div>
        </div>
        <button class="enter-btn" onclick="joinRoomAction()">100%免费连麦进房</button>
    </div>
</div>

<div class="room-container">
    <div class="room-header">
        <div class="room-title">
            <h3>TT语音·P2P免签开黑房</h3>
            <p>去中心化公共频道: <span style="color:#00f5d4;">Free_Zone_999</span></p>
        </div>
        <button class="btn" style="background:#ea5455;" onclick="leaveRoom()">退出</button>
    </div>
    <div class="seats-grid" id="seatsGrid"></div>
    <div class="chat-area" id="chatArea">
        <div class="msg-item msg-system">【系统】已切换至免费 P2P 语音流。由于没有中转服务器，首次开麦需双方均开启方可互通。</div>
    </div>
    <div class="emoji-bar">
        <span class="emoji-btn" onclick="insertEmoji('😂')">😂</span>
        <span class="emoji-btn" onclick="insertEmoji('🔥')">🔥</span>
        <span class="emoji-btn" onclick="insertEmoji('👍')">👍</span>
        <span class="emoji-btn" onclick="insertEmoji('❤️')">❤️</span>
        <span class="emoji-btn" onclick="insertEmoji('👑')">👑</span>
        <span class="emoji-btn" onclick="insertEmoji('💩')">💩</span>
    </div>
    <div class="bottom-bar">
        <div class="btn-icon" id="micBtn" onclick="toggleMic()">🔇</div>
        <input type="text" class="input-box" id="msgInput" placeholder="直接打字或发表情..." autocomplete="off">
        <button class="btn" onclick="sendMsg()">发送</button>
    </div>
</div>

<script>
    const AVATAR_COLORS = ["#ff4d6d", "#00f5d4", "#9d4edd", "#ffb703"];
    const CHANNEL_NAME = "pure_free_tt_room_999";

    let mqttClient = null;
    let myPeer = null;         // PeerJS 核心对象
    let localStream = null;    // 本地麦克风声音流
    let myNickname = "";
    let selectedAvatarIndex = 0;
    let isMuted = true;
    let roomUsers = {}; 

    function selectAvatar(index) {
        selectedAvatarIndex = index;
        const options = document.querySelectorAll('.avatar-option');
        options.forEach((opt, i) => opt.classList.toggle('selected', i === index));
    }

    function insertEmoji(emoji) {
        const input = document.getElementById('msgInput');
        input.value += emoji; input.focus();
    }

    // 核心启动逻辑
    function joinRoomAction() {
        const input = document.getElementById('nicknameInput').value.trim();
        // 核心避坑：免费公共Peer服务器对中文ID支持极差，强制要求使用英文或数字
        const reg = /^[A-Za-z0-9]+$/;
        if(!input || !reg.test(input)) {
            alert("为了免费通道稳定，昵称必须是纯英文或数字！");
            return;
        }
        myNickname = input + "_" + Math.floor(Math.random()*100); // 加随机数防止重名死锁

        document.getElementById('loginOverlay').style.display = 'none';
        renderBlankSeats();

        // 1. 启动免费 P2P 语音引擎
        initFreeVoiceEngine();
        // 2. 启动数据同步
        initMqttChannel();

        document.getElementById('msgInput').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') { sendMsg(); this.blur(); }
        });
    }

    function renderBlankSeats() {
        const grid = document.getElementById('seatsGrid');
        grid.innerHTML = '';
        for(let i = 1; i <= 8; i++) {
            grid.innerHTML += `
                <div class="seat-item" id="seat_${i}">
                    <div class="avatar-wrap">
                        <svg viewBox="0 0 1024 1024"><path d="M512 512c141.4 0 256-114.6 256-256S653.4 0 512 0 256 114.6 256 256s114.6 256 256 256zM512 614.4c-243.2 0-512 121.6-512 364.8v44.8h1024v-44.8c0-243.2-268.8-364.8-512-364.8z" fill="#44445c"/></svg>
                        <span class="seat-index">${i === 1 ? '房主' : i + '麦'}</span>
                    </div>
                    <span class="user-name">空闲麦位</span>
                </div>
            `;
        }
    }

    // --- 🔑 核心解密：100% 免费的 P2P 语音通话实现 ---
    function initFreeVoiceEngine() {
        // 创建一个基于 PeerJS 免费云的节点
        myPeer = new Peer(myNickname);

        myPeer.on('open', (id) => {
            console.log('我的免费语音P2P节点ID:', id);
        });

        // 核心机制：当房间里的“其他人”打电话呼叫我时，我该怎么处理
        myPeer.on('call', (call) => {
            // 如果我已经拿到了麦克风流，直接回应他；如果没有，用一个空的空流回应
            if(localStream) {
                call.answer(localStream);
            } else {
                // 创建一个静音虚轨，用以维持 P2P 通道建立
                const fakeContext = new (window.AudioContext || window.webkitAudioContext)();
                const fakeOsc = fakeContext.createOscillator();
                const fakeDst = fakeContext.createMediaStreamDestination();
                fakeOsc.connect(fakeDst);
                call.answer(fakeDst.stream);
            }

            // 当收到对方的声音传过来时，立刻在手机里播放
            call.on('stream', (remoteStream) => {
                playRemoteAudio(remoteStream);
            });
        });
    }

    // 播放远程队友传过来的声音
    function playRemoteAudio(stream) {
        // 防止重复创建标签
        const audioId = `audio_${stream.id}`;
        if(document.getElementById(audioId)) return;

        const audio = document.createElement('audio');
        audio.id = audioId;
        audio.srcObject = stream;
        audio.autoplay = true;
        audio.controls = false;
        document.body.appendChild(audio);
    }

    // 当我自己选择“开麦”时，主动呼叫房间里的所有其他人
    async function toggleMic() {
        isMuted = !isMuted;
        const micBtn = document.getElementById('micBtn');

        if(!isMuted) {
            try {
                // 采集硬件声音
                localStream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: true, noiseSuppression: true }
                });
                
                micBtn.innerText = "🎤";
                micBtn.classList.remove('active');
                appendSystemMsg("你已开启麦克风！正在发起点对点语音互连...");

                // 【核心P2P扩散】：主动给房间里在线的每一个队友拨打语音电话
                Object.keys(roomUsers).forEach(username => {
                    if(username !== myNickname) {
                        const call = myPeer.call(username, localStream);
                        if(call) {
                            call.on('stream', (remoteStream) => {
                                playRemoteAudio(remoteStream);
                            });
                        }
                    }
                });

            } catch (err) {
                isMuted = true;
                alert("开麦失败，请允许网页使用你的麦克风权限！");
                return;
            }
        } else {
            // 关闭麦克风硬件采集
            if(localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            micBtn.innerText = "🔇";
            micBtn.classList.add('active');
            appendSystemMsg("你已闭麦");
        }

        publishMsg({ type: 'mic', user: myNickname, isMuted: isMuted });
    }

    // --- 数据同步（依然使用免费的公共MQTT网关） ---
    function initMqttChannel() {
        const brokerUrl = 'wss://broker.emqx.io:8084/mqtt'; 
        mqttClient = mqtt.connect(brokerUrl, { connectTimeout: 4000, clientId: 'free_tt_' + Math.random().toString(16).substr(2, 8) });

        mqttClient.on('connect', () => {
            mqttClient.subscribe(CHANNEL_NAME);
            publishMsg({ type: 'join', user: myNickname, avatarIdx: selectedAvatarIndex, isMuted: isMuted });
        });

        mqttClient.on('message', (topic, packet) => {
            try {
                const data = JSON.parse(packet.toString());
                if (data.type === 'join') {
                    roomUsers[data.user] = { avatarIdx: data.avatarIdx, isMuted: data.isMuted };
                    refreshSeatsLayout();
                    appendSystemMsg(`${data.user} 坐上了麦位`);
                    if(data.user !== myNickname) {
                        publishMsg({ type: 'sync_resp', user: myNickname, avatarIdx: selectedAvatarIndex, isMuted: isMuted });
                    }
                } 
                else if (data.type === 'sync_resp') {
                    roomUsers[data.user] = { avatarIdx: data.avatarIdx, isMuted: data.isMuted };
                    refreshSeatsLayout();
                }
                else if (data.type === 'chat') {
                    appendChatMsg(data.sender, data.avatarIdx, data.text);
                } 
                else if (data.type === 'mic') {
                    if(roomUsers[data.user]) roomUsers[data.user].isMuted = data.isMuted;
                    refreshSeatsLayout();
                }
                else if (data.type === 'leave') {
                    delete roomUsers[data.user];
                    refreshSeatsLayout();
                }
            } catch (e) {}
        });
    }

    function refreshSeatsLayout() {
        renderBlankSeats();
        const users = Object.keys(roomUsers);
        users.forEach((username, index) => {
            if(index >= 8) return;
            const seatId = index + 1;
            const userData = roomUsers[username];
            const seatDom = document.getElementById(`seat_${seatId}`);
            if(seatDom) {
                seatDom.querySelector('.avatar-wrap svg').innerHTML = `<path d="M512 512c141.4 0 256-114.6 256-256S653.4 0 512 0 256 114.6 256 256s114.6 256 256 256zM512 614.4c-243.2 0-512 121.6-512 364.8v44.8h1024v-44.8c0-243.2-268.8-364.8-512-364.8z" fill="${AVATAR_COLORS[userData.avatarIdx]}"/>`;
                const nameSpan = seatDom.querySelector('.user-name');
                nameSpan.innerText = username.split('_')[0]; // 去掉随机数后缀显示
                nameSpan.style.color = "#ffffff";
                if(!userData.isMuted) {
                    nameSpan.innerText += " 🎙️";
                    seatDom.classList.add('speaking');
                } else {
                    seatDom.classList.remove('speaking');
                }
            }
        });
    }

    function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text) return;
        publishMsg({ type: 'chat', sender: myNickname, avatarIdx: selectedAvatarIndex, text: text });
        input.value = '';
    }

    function publishMsg(obj) {
        if(mqttClient && mqttClient.connected) mqttClient.publish(CHANNEL_NAME, JSON.stringify(obj), { qos: 0 });
    }

    function appendChatMsg(sender, avatarIdx, text) {
        const chatArea = document.getElementById('chatArea');
        const msgDiv = document.createElement('div'); msgDiv.className = 'msg-item';
        const senderSpan = document.createElement('span'); senderSpan.className = 'sender';
        senderSpan.innerHTML = `<span style="width:8px;height:8px;background:${AVATAR_COLORS[avatarIdx]};border-radius:50%;display:inline-block;"></span> ` + (sender === myNickname ? '我: ' : `${sender.split('_')[0]}: `);
        if(sender === myNickname) senderSpan.style.color = "#9d4edd";
        const textSpan = document.createElement('span'); textSpan.textContent = text; 
        msgDiv.appendChild(senderSpan); msgDiv.appendChild(textSpan);
        chatArea.appendChild(msgDiv);
        chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
    }

    function appendSystemMsg(text) {
        const chatArea = document.getElementById('chatArea');
        const msgDiv = document.createElement('div'); msgDiv.className = 'msg-item msg-system';
        msgDiv.textContent = text; chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function leaveRoom() {
        if(confirm('确定退出吗？')) {
            publishMsg({ type: 'leave', user: myNickname });
            window.location.reload();
        }
    }
</script>
</body>
</html>
